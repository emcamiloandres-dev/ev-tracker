<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Tracker Pro + Map</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 10px; margin: 0; }
        .card { background: #1e1e1e; border-radius: 15px; padding: 15px; margin-bottom: 10px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { width: 90%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; background: #252525; color: white; }
        button { background: #00e676; color: black; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; margin-top: 5px; }
        .btn-reset { background: #ff9100; color: white; }
        .btn-stop { background: #ff5252; color: white; }
        #map { height: 250px; width: 100%; border-radius: 15px; margin-top: 10px; border: 1px solid #444; }
        .valor { color: #00e676; font-weight: bold; font-size: 1.1em; }
        .switch-container { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; font-size: 0.9em; }
    </style>
</head>
<body>

    <div id="setup" class="card">
        <h2 style="color: #00e676; margin-top: 0;">⚡ EV Tracker</h2>
        <div class="grid">
            <div><label>Odómetro (km)</label><input type="number" id="odoTotal" step="0.1"></div>
            <div><label>Autonomía (km)</label><input type="number" id="autonomiaMax"></div>
        </div>
        <button onclick="resetearCarga()" class="btn-reset">🔋 Resetear Ciclo de Carga</button>
        <button onclick="iniciarViaje()" style="margin-top: 15px;">▶️ INICIAR RUTA</button>
        <div id="listaHistorial" style="margin-top: 15px; font-size: 0.8em; text-align: left;"></div>
    </div>

    <div id="dashboard" class="card" style="display:none;">
        <div id="map"></div>
        
        <div class="switch-container">
            <span>Mantener pantalla encendida</span>
            <input type="checkbox" id="wakeLockCheck" onchange="toggleWakeLock()" style="width: auto;">
        </div>

        <div class="grid" style="margin-top: 10px;">
            <p>Odo: <span id="dispOdo" class="valor">0</span></p>
            <p>Viaje: <span id="distancia" class="valor">0.00</span></p>
        </div>
        <div style="font-size: 2em;">🔋 <span id="bateria">100</span>% | <span id="restante" class="valor">0</span> km</div>
        
        <button onclick="finalizarViaje()" class="btn-stop">🏁 FINALIZAR</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let totalDistanciaViaje = 0, ultimaPos = null, watchID = null, map = null, marker = null, wakeLock = null;

        window.onload = () => {
            document.getElementById('odoTotal').value = localStorage.getItem('ev_odo') || 0;
            document.getElementById('autonomiaMax').value = localStorage.getItem('ev_autonomia') || 0;
            mostrarHistorial();
        };

        async function toggleWakeLock() {
            if (document.getElementById('wakeLockCheck').checked) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) { console.error(`${err.name}, ${err.message}`); }
            } else {
                if (wakeLock) { wakeLock.release(); wakeLock = null; }
            }
        }

        function iniciarViaje() {
            const auto = parseFloat(document.getElementById('autonomiaMax').value);
            if (!auto) return alert("Ingresa autonomía");
            
            localStorage.setItem('ev_odo', document.getElementById('odoTotal').value);
            localStorage.setItem('ev_autonomia', auto);

            document.getElementById('setup').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';

            // Inicializar Mapa
            if (!map) {
                map = L.map('map').setView([0, 0], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                marker = L.marker([0, 0]).addTo(map);
            }

            watchID = navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const nuevaPos = { latitude: lat, longitude: lon };

                map.setView([lat, lon], 17);
                marker.setLatLng([lat, lon]);

                if (ultimaPos) {
                    const d = haversine(ultimaPos.latitude, ultimaPos.longitude, lat, lon);
                    if (d > 0.005) {
                        totalDistanciaViaje += d;
                        actualizarUI(parseFloat(localStorage.getItem('ev_odo')), auto);
                    }
                }
                ultimaPos = nuevaPos;
            }, null, { enableHighAccuracy: true });
        }

        function actualizarUI(odoInicial, autoMax) {
            let kmDesdeCarga = parseFloat(localStorage.getItem('ev_km_desde_carga') || 0) + totalDistanciaViaje;
            let porc = Math.max(0, 100 - (kmDesdeCarga * 100 / autoMax));
            document.getElementById('dispOdo').innerText = (odoInicial + totalDistanciaViaje).toFixed(1);
            document.getElementById('distancia').innerText = totalDistanciaViaje.toFixed(2);
            document.getElementById('bateria').innerText = Math.round(porc);
            document.getElementById('restante').innerText = (autoMax - kmDesdeCarga).toFixed(1);
        }

        function finalizarViaje() {
            let kmDesdeCargaPrevio = parseFloat(localStorage.getItem('ev_km_desde_carga') || 0);
            localStorage.setItem('ev_odo', document.getElementById('dispOdo').innerText);
            localStorage.setItem('ev_km_desde_carga', kmDesdeCargaPrevio + totalDistanciaViaje);
            
            let historial = JSON.parse(localStorage.getItem('ev_historial') || "[]");
            historial.unshift({ fecha: new Date().toLocaleString(), distancia: totalDistanciaViaje.toFixed(2) });
            localStorage.setItem('ev_historial', JSON.stringify(historial.slice(0, 5)));
            
            if (wakeLock) wakeLock.release();
            location.reload();
        }

        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function resetearCarga() { 
            if(confirm("¿Batería al 100%?")) {
                localStorage.setItem('ev_km_desde_carga', 0);
                alert("Ciclo reiniciado"); 
            }
        }

        function mostrarHistorial() {
            const historial = JSON.parse(localStorage.getItem('ev_historial') || "[]");
            document.getElementById('listaHistorial').innerHTML = historial.map(i => `<div>📅 ${i.fecha} | 🏁 ${i.distance || i.distancia} km</div>`).join('');
        }
    </script>
</body>
</html>
