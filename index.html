<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EV Tracker Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 10px; margin: 0; overflow-x: hidden; }
        .card { background: #1e1e1e; border-radius: 15px; padding: 15px; margin-bottom: 10px; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { font-size: 0.8em; color: #aaa; margin-bottom: 4px; display: block; text-align: left; }
        input { width: 90%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; background: #252525; color: white; font-size: 16px; }
        button { background: #00e676; color: black; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:active { transform: scale(0.98); opacity: 0.8; }
        .btn-reset { background: #ff9100; color: white; margin-bottom: 10px; }
        .btn-stop { background: #ff5252 !important; color: white; margin-top: 15px; }
        .btn-secondary { background: #444; color: white; border: 2px solid #555; }
        
        /* Gráfico de Batería Circular */
        .battery-container { position: relative; width: 120px; height: 120px; margin: 0 auto 15px auto; }
        .battery-svg { transform: rotate(-90deg); width: 120px; height: 120px; }
        .circle-bg { fill: none; stroke: #333; stroke-width: 8; }
        .circle-progress { fill: none; stroke: #00e676; stroke-width: 8; stroke-linecap: round; stroke-dasharray: 314; stroke-dashoffset: 314; transition: stroke-dashoffset 1s ease-in-out; }
        .battery-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.5em; font-weight: bold; }

        #map { height: 220px; width: 100%; border-radius: 15px; border: 1px solid #444; }
        .map-container { position: relative; margin-bottom: 10px; }
        .map-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; background: rgba(0,0,0,0); }
        .valor { color: #00e676; font-weight: bold; font-size: 1.2em; display: block; }
        .historial-item { text-align: left; font-size: 0.85em; border-bottom: 1px solid #333; padding: 10px 0; color: #ddd; }
        .alert { color: #ff5252; font-weight: bold; animation: blink 1s infinite; margin-top: 10px; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="setup" class="card">
        <h2 style="color: #00e676; margin: 0 0 15px 0;">⚡ EV Tracker Pro</h2>
        
        <div class="battery-container">
            <svg class="battery-svg">
                <circle class="circle-bg" cx="60" cy="60" r="50"></circle>
                <circle id="circleMain" class="circle-progress" cx="60" cy="60" r="50"></circle>
            </svg>
            <div class="battery-text"><span id="percMain">0</span>%</div>
        </div>

        <div style="margin-bottom: 20px;">
            <span style="color: #aaa; font-size: 0.9em;">Estimado restante:</span>
            <div style="font-size: 1.8em; font-weight: bold; color: #00e676;"><span id="kmMain">0.0</span> km</div>
        </div>
        
        <div class="grid">
            <div>
                <label>Odómetro Total (km)</label>
                <input type="number" id="odoTotal" step="0.1" onchange="actualizarEstadoInicial()">
            </div>
            <div>
                <label>Autonomía Máx (km)</label>
                <input type="number" id="autonomiaMax" onchange="actualizarEstadoInicial()">
            </div>
        </div>

        <button onclick="resetearCarga()" class="btn-reset">🔋 Resetear Ciclo de Carga</button>
        <p style="font-size: 0.75em; color: #888; margin-bottom: 15px;">Última carga: <span id="infoCarga">-</span></p>
        
        <button onclick="iniciarViaje()" style="font-size: 1.2em;">▶️ INICIAR RECORRIDO</button>
        
        <div style="margin-top: 20px; text-align: left;">
            <h4 style="border-bottom: 1px solid #444; padding-bottom: 5px;">Últimos 5 Viajes</h4>
            <div id="listaHistorial"></div>
        </div>
    </div>

    <div id="dashboard" class="card" style="display:none;">
        <div class="map-container">
            <div id="map"></div>
            <div class="map-overlay"></div>
        </div>
        
        <button id="btnWakeLock" onclick="toggleWakeLock()" class="btn-secondary">
            Pantalla: AUTO (Se apagará)
        </button>

        <div class="grid" style="margin-top: 15px;">
            <div style="background: #252525; padding: 10px; border-radius: 10px;">
                <span style="font-size: 0.8em; color: #aaa;">Odómetro</span>
                <span id="dispOdo" class="valor">0</span>
            </div>
            <div style="background: #252525; padding: 10px; border-radius: 10px;">
                <span style="font-size: 0.8em; color: #aaa;">Este viaje</span>
                <span id="distancia" class="valor">0.00</span>
            </div>
        </div>
        
        <div style="font-size: 2.2em; margin: 15px 0; font-weight: bold;">
            🔋 <span id="bateria">100</span>%
        </div>
        
        <p style="color: #aaa; margin: 0;">Restante estimado: <span id="restante" class="valor" style="display: inline;">0.00</span> km</p>
        <div id="alertaCarga" class="alert" style="display:none;">⚠️ ¡BATERÍA BAJA!</div>
        
        <button onclick="finalizarViaje()" class="btn-stop">🏁 FINALIZAR Y GUARDAR</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let totalDistanciaViaje = 0, ultimaPos = null, watchID = null, map = null, marker = null, wakeLock = null;

        window.onload = () => {
            document.getElementById('odoTotal').value = localStorage.getItem('ev_odo') || 0;
            document.getElementById('autonomiaMax').value = localStorage.getItem('ev_autonomia') || 0;
            document.getElementById('infoCarga').innerText = localStorage.getItem('ev_fecha_carga') || "Sin registro";
            actualizarEstadoInicial();
            mostrarHistorial();
        };

        // Nueva función para actualizar el gráfico inicial
        function actualizarEstadoInicial() {
            const autoMax = parseFloat(document.getElementById('autonomiaMax').value) || 0;
            const kmDesdeCarga = parseFloat(localStorage.getItem('ev_km_desde_carga') || 0);
            
            if (autoMax > 0) {
                const porc = Math.max(0, 100 - (kmDesdeCarga * 100 / autoMax));
                const rest = Math.max(0, autoMax - kmDesdeCarga);
                
                // Actualizar texto
                document.getElementById('percMain').innerText = Math.round(porc);
                document.getElementById('kmMain').innerText = rest.toFixed(1);
                
                // Actualizar círculo (SVG dashoffset: 314 es 0%, 0 es 100%)
                const offset = 314 - (314 * porc / 100);
                document.getElementById('circleMain').style.strokeDashoffset = offset;
                
                // Cambiar color si es baja
                document.getElementById('circleMain').style.stroke = porc <= 20 ? "#ff5252" : "#00e676";
            }
        }

        async function toggleWakeLock() {
            const btn = document.getElementById('btnWakeLock');
            if (!wakeLock) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    btn.innerText = "Pantalla: SIEMPRE ENCENDIDA";
                    btn.style.background = "#007bff";
                    btn.style.borderColor = "#00e676";
                } catch (err) { console.log(err); }
            } else {
                await wakeLock.release();
                wakeLock = null;
                btn.innerText = "Pantalla: AUTO (Se apagará)";
                btn.style.background = "#444";
                btn.style.borderColor = "#555";
            }
        }

        function iniciarViaje() {
            const odo = parseFloat(document.getElementById('odoTotal').value) || 0;
            const auto = parseFloat(document.getElementById('autonomiaMax').value) || 0;
            if (auto <= 0) return alert("Ingresa la autonomía máxima");

            localStorage.setItem('ev_odo', odo);
            localStorage.setItem('ev_autonomia', auto);
            totalDistanciaViaje = 0;
            ultimaPos = null;

            document.getElementById('setup').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';

            if (!map) {
                map = L.map('map', { dragging: false, touchZoom: false, scrollWheelZoom: false, doubleClickZoom: false, zoomControl: false, attributionControl: false }).setView([0, 0], 17);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                marker = L.marker([0, 0]).addTo(map);
            }

            watchID = navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude, lon = pos.coords.longitude;
                map.setView([lat, lon], 17);
                marker.setLatLng([lat, lon]);
                if (ultimaPos) {
                    const d = haversine(ultimaPos.latitude, ultimaPos.longitude, lat, lon);
                    if (d > 0.005) { totalDistanciaViaje += d; actualizarUI(odo, auto); }
                }
                ultimaPos = { latitude: lat, longitude: lon };
            }, err => console.error(err), { enableHighAccuracy: true, maximumAge: 0 });
        }

        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a))) * 1.173;
        }

        function actualizarUI(odoInicial, autoMax) {
            let kmDesdeCarga = parseFloat(localStorage.getItem('ev_km_desde_carga') || 0) + totalDistanciaViaje;
            let porc = Math.max(0, 100 - (kmDesdeCarga * 100 / autoMax));
            document.getElementById('dispOdo').innerText = (odoInicial + totalDistanciaViaje).toFixed(1);
            document.getElementById('distancia').innerText = totalDistanciaViaje.toFixed(2);
            document.getElementById('bateria').innerText = Math.round(porc);
            document.getElementById('restante').innerText = (autoMax - kmDesdeCarga).toFixed(2);
            document.getElementById('alertaCarga').style.display = porc <= 20 ? 'block' : 'none';
        }

        function finalizarViaje() {
            let kmDesdeCargaPrevio = parseFloat(localStorage.getItem('ev_km_desde_carga') || 0);
            localStorage.setItem('ev_odo', document.getElementById('dispOdo').innerText);
            localStorage.setItem('ev_km_desde_carga', kmDesdeCargaPrevio + totalDistanciaViaje);
            let historial = JSON.parse(localStorage.getItem('ev_historial') || "[]");
            historial.unshift({ fecha: new Date().toLocaleString(), distancia: totalDistanciaViaje.toFixed(2) });
            localStorage.setItem('ev_historial', JSON.stringify(historial.slice(0, 5)));
            if (watchID) navigator.geolocation.clearWatch(watchID);
            if (wakeLock) wakeLock.release();
            location.reload(); 
        }

        function resetearCarga() {
            if(confirm("¿Confirmas batería al 100%?")) {
                localStorage.setItem('ev_km_desde_carga', 0);
                localStorage.setItem('ev_fecha_carga', new Date().toLocaleString());
                location.reload();
            }
        }

        function mostrarHistorial() {
            const historial = JSON.parse(localStorage.getItem('ev_historial') || "[]");
            const lista = document.getElementById('listaHistorial');
            lista.innerHTML = historial.length ? "" : "<p style='color:#666'>No hay viajes.</p>";
            historial.forEach(item => {
                lista.innerHTML += `<div class="historial-item">📅 ${item.fecha}<br>🏁 Distancia: <span class="valor" style="font-size:1em">${item.distancia} km</span></div>`;
            });
        }
    </script>
</body>
</html>
